server:
  port: ${PORT:8080}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  application:
    name: signalist-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/signalist}
      database: ${MONGODB_DATABASE:signalist}
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  session:
    cookie-name: ${SESSION_COOKIE_NAME:signalist_session}
    ttl: ${SESSION_TTL:P14D}
  finnhub:
    base-url: ${FINNHUB_BASE_URL:https://finnhub.io/api/v1}
    api-key: ${FINNHUB_API_KEY:}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from-name: ${MAIL_FROM_NAME:Signalist}
    from-address: ${MAIL_FROM_ADDRESS:noreply@signalist.local}
  jobs:
    daily-digest-enabled: ${DAILY_DIGEST_ENABLED:false}
    daily-digest-cron: ${DAILY_DIGEST_CRON:0 0 12 * * *}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:*}

logging:
  level:
    com.signalist.backend: INFO
